name: Point-Bot-Automation

on:
  schedule:
    # 🚀 한국 시간 기준 (UTC+9 계산)
    - cron: '0 0 * * *'  # 오전 09:00 (UTC 00:00)
    - cron: '0 3 * * *'  # 오후 12:00 (UTC 03:00)
    - cron: '0 9 * * *'  # 오후 18:00 (UTC 09:00)
  workflow_dispatch:      # 🚀 사장님이 폰으로 누르는 '수동 버튼' (유지)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run Bot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python bot.py
